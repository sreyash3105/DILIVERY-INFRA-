events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Upstream backend instances (Load Balancing via Round-Robin with passive health checks)
    upstream backend_api {
        server api-1:8000 max_fails=3 fail_timeout=10s;
        # server api-2:8000 max_fails=3 fail_timeout=10s;
        # server api-3:8000 max_fails=3 fail_timeout=10s;
    }

    # HTTP Server: Redirects all port 80 traffic to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server: Enforces TLS Termination and proxies requests
    server {
        listen 443 ssl;
        server_name localhost;

        # TLS Certificate Configuration (Mount certificates inside container at path below)
        ssl_certificate /etc/nginx/certs/api.crt;
        ssl_certificate_key /etc/nginx/certs/api.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Health Check Nginx proxy routing
        location /health {
            proxy_pass http://backend_api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backend REST API routes
        location ~ ^/(deliveries|drivers|analytics|docs|openapi.json) {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoints (Real-time fleet tracking and customer track paths)
        location ~ ^/(fleet|track/.*) {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Prevent Nginx from closing WebSocket connections prematurely
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Serve Frontend Static Assets & SPA routing
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
